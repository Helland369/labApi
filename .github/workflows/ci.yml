name: CI Pipeline # 1. Navn (vises i GitHub UI)

on: # 2. Triggere (når skal den kjøre?)
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version tag"
        required: true
        type: string

env: # 3. Globale miljøvariabler
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIGURATION: "Release"
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs: # 4. Jobber
  build: #    Jobb-navn (ID)
    name: Build and Test #    Visningsnavn
    runs-on: ubuntu-latest #    Operativsystem (runner)

    steps: # 5. Steg (sekvensielle)
      - name: Checkout code #    Steg-navn
        uses: actions/checkout@v5 #    Bruk action

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore #    Kjør shell-kommando

      - name: Build
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --no-build

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build              # Venter på build-jobben
    steps:
      - uses: actions/checkout@v5
      - run: dotnet test

  lint:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: build              # Venter på build-jobben
    steps:
      - uses: actions/checkout@v5
      - run: dotnet format

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
