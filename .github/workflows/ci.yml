name: CI Pipeline # 1. Navn (vises i GitHub UI)

on: # 2. Triggere (når skal den kjøre?)
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version tag"
        required: true
        type: string

env: # 3. Globale miljøvariabler
  DOTNET_VERSION: "10.0.x"
  BUILD_CONFIGURATION: "Release"

jobs: # 4. Jobber
  build: #    Jobb-navn (ID)
    name: Build and Test #    Visningsnavn
    runs-on: ubuntu-latest #    Operativsystem (runner)

    steps: # 5. Steg (sekvensielle)
      - name: Checkout code #    Steg-navn
        uses: actions/checkout@v5 #    Bruk action

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore #    Kjør shell-kommando

      - name: Build
        run: dotnet build --configuration ${{ env.BUILD_CONFIGURATION }} --no-restore

      - name: Test
        run: dotnet test --no-build
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build              # Venter på build-jobben
    steps:
      - uses: actions/checkout@v5
      - run: dotnet test
  lint:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: build              # Venter på build-jobben
    steps:
      - uses: actions/checkout@v5
      - run: dotnet format --check